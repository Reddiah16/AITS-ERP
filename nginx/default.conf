upstream backend_server {
    server backend:5000;
}

upstream ai_server {
    server ai-service:8000;
}

server {
    listen 80;
    server_name aits-erp.ac.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name aits-erp.ac.in;

    ssl_certificate /etc/nginx/ssl/aits_erp.crt;
    ssl_certificate_key /etc/nginx/ssl/aits_erp.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Secure HTTP Headers (XSS, CSRF support, Secure Cookies)
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Frontend Client
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Express REST API Backend
    location /api/ {
        proxy_pass http://backend_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Enable secure session cookies
        proxy_cookie_path / "/; HTTPOnly; Secure; SameSite=Strict";
    }

    # Python FastAPI AI Microservice
    location /api/ai/ {
        proxy_pass http://ai_server/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
